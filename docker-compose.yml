services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    # Port 8000 is NOT published to the host — only reachable via Caddy.
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - rfe-data:/app/data
    environment:
      RFE_DB_PATH: /app/data/rfe.db
      RFE_AUDIT_LOG: /app/data/audit.jsonl
    restart: unless-stopped

volumes:
  rfe-data:
  caddy_data:
