<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rejection Feedback Engine</title>
  <link rel="stylesheet" href="/static/app.css?v=20260613-6">
</head>
<body>
  <header>
    <h1>Rejection Feedback Engine</h1>
    <div class="keybar">
      <input id="api-key" type="password" placeholder="API key" autocomplete="off">
      <button id="save-key">Connect</button>
      <button id="clear-local-drafts">Clear local drafts</button>
      <span id="role-badge" class="badge"></span>
    </div>
  </header>

  <nav id="nav" hidden>
    <button data-view="roles">Roles</button>
    <button data-view="rubric">Rubric</button>
    <button data-view="candidates">Candidates</button>
    <button data-view="evaluations">Evaluations</button>
    <button data-view="feedback">Feedback queue</button>
  </nav>

  <main hidden>
    <section id="view-roles" class="view">
      <h2>Roles</h2>
      <form id="role-form">
        <input name="title" placeholder="Role title" required>
        <input name="description" placeholder="Description">
        <button>Create role</button>
      </form>
      <ul id="role-list"></ul>
    </section>

    <section id="view-rubric" class="view" hidden>
      <h2>Rubric editor</h2>
      <p>Role: <select id="rubric-role"></select>
         <button id="draft-from-jd">Draft from JD</button></p>
      <table id="criteria-table">
        <thead><tr><th>id</th><th>name</th><th>type</th><th>weight</th></tr></thead>
        <tbody></tbody>
      </table>
      <button id="add-criterion">Add criterion</button>
      <p>Salary band:
         <input id="salary-min" type="number" placeholder="min">
         <input id="salary-max" type="number" placeholder="max"></p>
      <p>Experience/level:
         <input id="experience-min" type="number" placeholder="min years">
         <input id="experience-max" type="number" placeholder="max years">
         <input id="allowed-levels" placeholder="SDE 2, SDE 3"></p>
      <button id="publish-rubric">Publish</button>
    </section>

    <section id="view-candidates" class="view" hidden>
      <h2>Candidates</h2>
      <form id="candidate-form">
        <select id="candidate-role"></select>
        <input name="name" placeholder="Name" required>
        <input name="email" type="email" placeholder="Email" required>
        <input name="salary_expectation" type="number" placeholder="Salary expectation">
        <input name="years_experience" type="number" placeholder="Years experience">
        <input name="current_level" placeholder="Current level">
        <input id="resume-file" type="file" accept=".txt,.md,.pdf">
        <textarea name="resume_text" placeholder="Paste resume text" required></textarea>
        <button>Add candidate</button>
      </form>
      <div id="evaluation-progress" class="progress-panel" hidden aria-live="polite">
        <progress></progress>
        <span id="evaluation-progress-text"></span>
      </div>
      <ul id="candidate-list"></ul>
    </section>

    <section id="view-evaluations" class="view" hidden>
      <h2>Evaluations</h2>
      <ul id="evaluation-list"></ul>
    </section>

    <section id="view-feedback" class="view" hidden>
      <h2>Feedback approval queue</h2>
      <ul id="feedback-list"></ul>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="/static/app.js?v=20260613-6"></script>
</body>
</html>
